# AutoFlow v2.2 — Kubernetes Secret Template
# Apply with: kubectl apply -f k8s-secret-template.yaml -n autoflow-dev
#
# IMPORTANT: Replace placeholder values before applying.
# For production, use `kubectl create secret generic` with --from-literal flags.
#
# Example:
#   kubectl create secret generic autoflow-secrets \
#     --from-literal=pg-password='<password>' \
#     --from-literal=redis-password='<password>' \
#     --from-literal=llm-api-key='<key>' \
#     --from-literal=volc-ak='<access-key>' \
#     --from-literal=volc-sk='<secret-key>' \
#     --from-literal=audio-api-key='<key>' \
#     -n autoflow-dev

apiVersion: v1
kind: Secret
metadata:
  name: autoflow-secrets
  namespace: autoflow-dev
  labels:
    app: autoflow
    version: v2.2
type: Opaque
stringData:
  # PostgreSQL
  pg-password: "REPLACE_ME"

  # Redis
  redis-password: "REPLACE_ME"

  # LLM API (dmxapi.cn)
  llm-api-key: "REPLACE_ME"

  # Volcengine (TOS access)
  volc-ak: "REPLACE_ME"
  volc-sk: "REPLACE_ME"

  # Audio API (kie.ai)
  audio-api-key: "REPLACE_ME"
