name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout pytest-html
          # Install langgraph and core dependencies
          pip install langgraph langgraph-checkpoint
          # Install project dependencies if requirements.txt exists
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create .env.local stub
        run: |
          # Create minimal env so tests don't fail on missing env file
          echo "# CI test environment" > .env.local
          echo "PG_HOST=" >> .env.local

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v \
            --junitxml=test-results/unit.xml \
            --html=test-results/unit-report.html \
            --self-contained-html \
            -m "not slow and not gpu" \
            --tb=short
        continue-on-error: false

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v \
            --junitxml=test-results/integration.xml \
            --html=test-results/integration-report.html \
            --self-contained-html \
            -m "not slow and not gpu" \
            --tb=short
        continue-on-error: true

      - name: Generate combined test report
        if: always()
        run: |
          python -m pytest tests/unit/ tests/integration/ \
            --html=test-results/report.html \
            --self-contained-html \
            -m "not slow and not gpu" \
            --tb=short \
            -q || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Publish test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results/*.xml
          check_name: Test Results
          fail_on_failure: true
