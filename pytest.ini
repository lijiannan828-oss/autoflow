[pytest]
# AutoFlow v2.2 Test Configuration
testpaths = tests backend
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for selective test execution
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may need DB/Qdrant/MQ)
    e2e: End-to-end tests (full pipeline or frontend)
    gpu: Tests requiring GPU (ComfyUI/model inference)
    slow: Tests that take more than 10 seconds

# Default options
addopts =
    -v
    --strict-markers
    --tb=short
    -q

# Async mode for pytest-asyncio
asyncio_mode = auto

# Timeout: 30s default per test, GPU tests can override
timeout = 30

# Ignore virtual environments and node_modules
norecursedirs =
    .venv-connectivity
    node_modules
    .next
    __pycache__
    .git
    frontend
