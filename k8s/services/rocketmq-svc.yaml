apiVersion: v1
kind: Service
metadata:
  name: rocketmq-namesrv
  namespace: default
  labels:
    app: rocketmq-namesrv
spec:
  type: ClusterIP
  selector:
    app: rocketmq-namesrv
  ports:
    - name: namesrv
      port: 9876
      targetPort: 9876
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
  namespace: default
  labels:
    app: rocketmq-broker
spec:
  type: ClusterIP
  selector:
    app: rocketmq-broker
  ports:
    - name: broker
      port: 10911
      targetPort: 10911
    - name: proxy
      port: 8081
      targetPort: 8081
